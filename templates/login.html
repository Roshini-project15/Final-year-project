{% extends 'base.html' %}
{% block title %}Login - Attendance System{% endblock %}
{% block content %}
<div class="glass-card mx-auto" style="max-width: 450px; width: 100%;">
    <div class="text-center mb-5">
        <div class="mx-auto mb-4 d-flex align-items-center justify-content-center" 
             style="width: 80px; height: 80px; font-size: 2.5rem; border-radius: 24px; background: rgba(79, 70, 229, 0.1); color: var(--brand-primary); border: 1px solid rgba(79, 70, 229, 0.2);">
            <i class="fa fa-fingerprint"></i>
        </div>
        <h1 class="h2 mb-2 text-gradient">AutoSystem</h1>
        <p class="text-muted">Enter your secure academy workspace.</p>
    </div>

    <form action="/login" method="POST">
        <div class="mb-3">
            <label class="label-caps">Email Identity</label>
            <div class="input-group">
                <span class="input-group-text bg-white border-end-0 text-muted" style="border-radius: 12px 0 0 12px; border-color: #e2e8f0;"><i class="fa fa-envelope"></i></span>
                <input type="email" class="form-control border-start-0" name="email" placeholder="name@school.com" required style="border-radius: 0 12px 12px 0; background: #fff; border-color: #e2e8f0; color: var(--text-main);">
            </div>
        </div>

        <div class="mb-4">
            <label class="label-caps">Security Pass</label>
            <div class="input-group">
                <span class="input-group-text bg-white border-end-0 text-muted" style="border-radius: 12px 0 0 12px; border-color: #e2e8f0;"><i class="fa fa-lock"></i></span>
                <input type="password" id="password" class="form-control border-start-0 border-end-0" name="password" placeholder="••••••••" required style="background: #fff; border-color: #e2e8f0; color: var(--text-main);">
                <span class="input-group-text bg-white border-start-0 text-muted toggle-password" style="cursor: pointer; border-radius: 0 12px 12px 0; border-color: #e2e8f0;" onclick="togglePassword()">
                    <i class="fa fa-eye" id="eyeIcon"></i>
                </span>
            </div>
        </div>

        <div class="mb-4">
            <label class="label-caps">Academy Role</label>
            <select class="form-select" name="role" required style="border-radius: 12px; background: #fff; border-color: #e2e8f0; color: var(--text-main); padding: 0.85rem 1.25rem;">
                <option value="" disabled selected>Select your role...</option>
                <option value="student">Student Explorer</option>
                <option value="faculty">Faculty Leader</option>
            </select>
        </div>

        <button class="btn btn-zen w-100 py-3 shadow-lg mb-3">
            Sign In to Academy <i class="fa fa-arrow-right-long ms-2"></i>
        </button>
    </form>

    <div class="text-center mt-4 pt-4 border-top border-white border-opacity-5">
        <p class="text-muted small">New to AutoSystem? <a href="/register" class="text-gradient fw-bold text-decoration-none">Create Account</a></p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function togglePassword() {
    let password = document.getElementById("password");
    let icon = document.getElementById("eyeIcon");
    if (password.type === "password") {
        password.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        password.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}
</script>
{% endblock %}
