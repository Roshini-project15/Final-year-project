<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Attendance Management System{% endblock %}</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <!-- Toastify CSS -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

    <!-- Custom Style -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">


</head>

<body>
    <!-- Zen Animated Background Blobs -->
    <div class="blob-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="main-container">
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Toastify JS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <!-- Flash Messages Container -->
    <div id="flash-data-container" style="display: none;">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <span class="flash-msg" data-category="{{ category }}" data-message="{{ message }}"></span>
        {% endfor %}
        {% endif %}
        {% endwith %}
    </div>

    <!-- Flash Messages via Toastify -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            let flashNodes = document.querySelectorAll(".flash-msg");
            flashNodes.forEach(function (node) {
                let category = node.getAttribute("data-category");
                let message = node.getAttribute("data-message");

                let bgColor = (category === "error" || category === "danger") ? "linear-gradient(to right, #f43f5e, #e11d48)" : "linear-gradient(to right, #10b981, #059669)";
                Toastify({
                    text: message,
                    duration: 4000,
                    close: true,
                    gravity: "top",
                    position: "right",
                    style: {
                        background: bgColor,
                        borderRadius: "10px",
                        padding: "12px 20px",
                        boxShadow: "0 4px 12px rgba(0,0,0,0.15)",
                        fontWeight: "500",
                        color: "#fff"
                    }
                }).showToast();
            });
        });
    </script>

    {% block extra_js %}{% endblock %}
</body>

</html>
